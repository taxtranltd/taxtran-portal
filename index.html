const countWorkdays=(from,to,hols={})=>{
  let count=0;
  const cur=new Date(from+"T00:00:00");
  const end=new Date(to+"T00:00:00");
  while(cur<=end){
    const dow=cur.getDay();
    const ds=`${cur.getFullYear()}-${String(cur.getMonth()+1).padStart(2,"0")}-${String(cur.getDate()).padStart(2,"0")}`;
    if(dow!==0&&dow!==6&&!hols[ds])count++;
    cur.setDate(cur.getDate()+1);
  }
  return count;
};

const today=()=>{const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;};
const addDays=(dt,n)=>{const d=new Date(dt+"T00:00:00");d.setDate(d.getDate()+n);return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;};
const fmt=d=>new Date(d+"T00:00:00").toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"});
const fmtBal=(d,h)=>{const p=[];if(d)p.push(`${d}d`);if(h)p.push(`${h}h`);return p.length?p.join(" "):"0";};
const dBetween=(a,b)=>Math.round((new Date(b)-new Date(a))/86400000)+1;
const yOS=sd=>{if(!sd)return null;return Math.floor((new Date()-new Date(sd))/(1000*60*60*24*365.25)*10)/10;};
const chkNotice=(from,to,type,office)=>{
  const ahead=Math.round((new Date(from)-new Date(today()))/86400000);
  const dur=dBetween(from,to);
  if(type==="Compensatory Leave"){const r=COMP_RULES[office]||COMP_RULES["Taipei"];if(ahead<r.noticeDays)return `Comp leave requires ${r.noticeDays} days notice. You have ${ahead} day${ahead!==1?"s":""}.`;return null;}
  if(dur>=3&&ahead<14)return `3+ day applications require 2 weeks notice. You have ${ahead} day${ahead!==1?"s":""}.`;
  if(dur<=2&&ahead<2)return "1–2 day applications require 48 hours notice.";
  return null;
};

const jsonp=url=>new Promise((res,rej)=>{
  const cb="cb_"+Math.random().toString(36).slice(2);
  const s=document.createElement("script");
  window[cb]=d=>{res(d);delete window[cb];s.remove();};
  s.onerror=()=>{rej(new Error("JSONP failed"));delete window[cb];s.remove();};
  s.src=url+"&callback="+cb;
  document.head.appendChild(s);
});
const gsRead=async sheet=>{
  try{const d=await jsonp(`${GS_URL}?action=read&sheet=${sheet}`);if(!d||!d.length)return null;const h=d[0];return d.slice(1).map(r=>{const o={};h.forEach((k,i)=>o[k]=r[i]);return o;});}catch(e){return null;}
};
const gsWrite=async(sheet,records)=>{
  try{let data=[];if(records&&records.length){const h=Object.keys(records[0]);data=[h,...records.map(r=>h.map(k=>r[k]??""))];}await jsonp(`${GS_URL}?action=write&sheet=${sheet}&data=${encodeURIComponent(JSON.stringify(data))}`);}catch(e){console.error("gsWrite error",e);}
};

function LeaveForm({selOffice,initialType,onSubmit,onBack}){
  const isSick=initialType==="Sick Leave";
  const [type,setType]=React.useState(initialType||"Annual Leave");
  const [mode,setMode]=React.useState("single");
  const [session,setSession]=React.useState("full");
  const [urgent,setUrgent]=React.useState(false);
  const [note,setNote]=React.useState("");
  const [doc,setDoc]=React.useState(null);
  const [err,setErr]=React.useState("");
  const [done,setDone]=React.useState(false);
  const hasSession=type==="Annual Leave"||type==="Sick Leave"||type==="Other Leave";
  const getMin=()=>isSick||urgent?today():addDays(today(),2);
  const [from,setFrom]=React.useState(getMin);
  const [to,setTo]=React.useState(getMin);
  const hols=HOLIDAYS[selOffice]||{};
  const setModeX=m=>{setMode(m);const mn=getMin();setFrom(mn);setTo(mn);if(m==="range")setSession("full");};
  const setFromX=v=>{setFrom(v);if(to<v)setTo(v);};
  const setToX=v=>{setTo(v);if(type==="Annual Leave"&&!urgent&&dBetween(from,v)>=3){const m=addDays(today(),14);if(from<m)setFrom(m);}};
  const toggleU=()=>{const n=!urgent;setUrgent(n);const mn=n?today():addDays(today(),2);setFrom(mn);setTo(mn);};
  const realTo=mode==="single"?from:to;
  const mn=getMin();
  const effDays=Math.max(0,mode==="single"&&hasSession&&session!=="full"?0.5:countWorkdays(from,realTo,hols));
  const sessionLabel=session==="am"?"AM (Morning)":session==="pm"?"PM (Afternoon)":"Full Day";
  const compRule=COMP_RULES[selOffice]||COMP_RULES["Taipei"];
  const submit=()=>{
    setErr("");
    if(realTo<from){setErr("End date must be after start date.");return;}
    if(urgent&&!note.trim()){setErr("A note is required for urgent leave.");return;}
    if(type==="Annual Leave"&&!urgent){const e=chkNotice(from,realTo,type,selOffice);if(e){setErr(e);return;}}
    if(type==="Compensatory Leave"){const e=chkNotice(from,realTo,type,selOffice);if(e){setErr(e);return;}}
    onSubmit({leaveType:type,from,to:realTo,days:effDays,session:mode==="single"&&hasSession?session:"full",note,doctorNote:doc?.name||null,urgent});
    setDone(true);setTimeout(()=>onBack(),1800);
  };
  return(
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      {!isSick&&<div><Lbl>Leave Type</Lbl><div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{LEAVE_TYPES.filter(t=>t!=="Sick Leave").map(t=><button key={t} onClick={()=>{setType(t);const mn2=urgent?today():addDays(today(),2);setFrom(mn2);setTo(mn2);setSession("full");}} style={{flex:"1 1 auto",padding:"9px 6px",borderRadius:8,fontSize:11,fontWeight:600,cursor:"pointer",border:`1px solid ${type===t?C.acc:C.bdr}`,background:type===t?C.acc:C.sur,color:type===t?"#fff":C.txt}}>{t}</button>)}</div></div>}
      {type==="Annual Leave"&&<div><Lbl>Urgency</Lbl><div style={{display:"flex",gap:6}}>{[["false","Standard"],["true","Urgent"]].map(([v,l])=><button key={v} onClick={toggleU} style={{flex:1,padding:"9px",borderRadius:8,fontSize:13,fontWeight:600,cursor:"pointer",border:`1px solid ${String(urgent)===v?C.acc:C.bdr}`,background:String(urgent)===v?C.acc:C.sur,color:String(urgent)===v?"#fff":C.txt}}>{l}</button>)}</div>{urgent&&<div style={{background:"#fffbeb",border:`1px solid #fde68a`,borderRadius:8,padding:"8px 12px",fontSize:12,color:C.warn,marginTop:8}}>Urgent leave bypasses notice rules. Note is mandatory.</div>}</div>}
      <div><Lbl>Duration</Lbl><div style={{display:"flex",gap:6}}>{[["single","Single Day"],["range","Date Range"]].map(([v,l])=><button key={v} onClick={()=>setModeX(v)} style={{flex:1,padding:"9px",borderRadius:8,fontSize:13,fontWeight:600,cursor:"pointer",border:`1px solid ${mode===v?C.acc:C.bdr}`,background:mode===v?C.acc:C.sur,color:mode===v?"#fff":C.txt}}>{l}</button>)}</div></div>
      {mode==="single"&&hasSession&&<div><Lbl>Session</Lbl><div style={{display:"flex",gap:6}}>{[["am","AM"],["pm","PM"],["full","Full Day"]].map(([v,l])=><button key={v} onClick={()=>setSession(v)} style={{flex:1,padding:"9px",borderRadius:8,fontSize:13,fontWeight:600,cursor:"pointer",border:`1px solid ${session===v?C.acc:C.bdr}`,background:session===v?C.acc:C.sur,color:session===v?"#fff":C.txt}}>{l}</button>)}</div></div>}
      {mode==="single"?<div><Lbl>Date</Lbl><input type="date" value={from} min={mn} onChange={e=>setFrom(e.target.value)} style={inp}/>{hols[from]&&<div style={{background:"#f0fdf4",border:`1px solid #bbf7d0`,borderRadius:8,padding:"7px 12px",fontSize:12,color:C.ok,marginTop:6}}>{hols[from]} is a public holiday — won't count as leave.</div>}{!urgent&&!isSick&&<div style={{fontSize:11,color:C.muted,marginTop:5}}>Earliest: {fmt(mn)}</div>}</div>:<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}><div><Lbl>From</Lbl><input type="date" value={from} min={mn} onChange={e=>setFromX(e.target.value)} style={inp}/>{hols[from]&&<div style={{fontSize:11,color:C.ok,marginTop:4}}>{hols[from]}</div>}</div><div><Lbl>To</Lbl><input type="date" value={to} min={from} onChange={e=>setToX(e.target.value)} style={inp}/>{hols[to]&&<div style={{fontSize:11,color:C.ok,marginTop:4}}>{hols[to]}</div>}</div></div>}
      {mode==="single"&&hasSession&&!hols[from]&&<div style={{fontSize:13,color:C.muted,fontWeight:500}}>Deducting <strong>{effDays}</strong> day{effDays!==1?"s":""} — {sessionLabel}</div>}
      {mode==="range"&&from&&to&&to>=from&&<div style={{fontSize:13,color:C.muted,fontWeight:500}}><strong>{effDays}</strong> working day{effDays!==1?"s":""} will be deducted <span style={{color:C.muted,fontSize:12}}>(weekends & holidays excluded)</span></div>}
      {type==="Annual Leave"&&!urgent&&<div style={{background:C.sub,borderRadius:8,padding:"10px 14px",fontSize:12,color:C.muted,lineHeight:1.6}}>Notice: 1–2 days → 48 hrs · 3+ days → 2 weeks</div>}
      {type==="Compensatory Leave"&&<div style={{display:"flex",flexDirection:"column",gap:6}}><div style={{background:C.sub,borderRadius:8,padding:"10px 14px",fontSize:12,color:C.muted,lineHeight:1.6}}>{compRule.windowWeeks?`Must be taken within ${compRule.windowWeeks} weeks of returning from business trip.`:"No expiry limit."} Apply at least {compRule.noticeDays} days in advance.</div>{compRule.deadlineNote&&<div style={{background:"#fffbeb",border:`1px solid #fde68a`,borderRadius:8,padding:"10px 14px",fontSize:12,color:C.warn,lineHeight:1.6}}>{compRule.deadlineNote}</div>}</div>}
      {isSick&&<div><Lbl>Doctor's Note</Lbl><label style={{display:"block",border:`1px dashed ${doc?C.ok:C.bdr}`,borderRadius:8,padding:"14px",cursor:"pointer",background:doc?"#f0fdf4":C.sub,textAlign:"center"}}><input type="file" accept="image/*,application/pdf" onChange={e=>setDoc(e.target.files[0]||null)} style={{display:"none"}}/>{doc?<div><div style={{fontSize:13,fontWeight:600,color:C.ok}}>File attached</div><div style={{fontSize:12,color:C.muted}}>{doc.name}</div></div>:<div><div style={{fontSize:13,fontWeight:600,color:C.muted}}>Upload doctor's note</div><div style={{fontSize:11,color:C.muted}}>JPG, PNG or PDF</div></div>}</label>{doc&&<button onClick={()=>setDoc(null)} style={{background:"none",border:"none",color:C.err,fontSize:12,cursor:"pointer",marginTop:6,padding:0}}>Remove</button>}</div>}
      <div><Lbl>Note {urgent?"(required)":"(optional)"}</Lbl><input value={note} onChange={e=>setNote(e.target.value)} placeholder={urgent?"Explain reason for urgent leave...":"Add a note..."} style={{...inp,borderColor:urgent&&!note.trim()?C.warn:C.bdr}}/></div>
      {err&&<div style={{background:"#fef2f2",border:`1px solid #fecaca`,borderRadius:8,padding:"10px 14px",fontSize:13,color:C.err}}>{err}</div>}
      <Btn onClick={submit} style={{width:"100%",padding:12,background:done?C.ok:C.acc}}>{done?"Submitted":"Submit Application"}</Btn>
    </div>
  );
}

// ── CALENDAR ──
function Calendar({leaveApps,officeFilter}){
  const now=new Date();
  const [cal,setCal]=React.useState(`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`);
  const [sel,setSel]=React.useState(null);
  const [hov,setHov]=React.useState(null);
  const [yr,mo]=cal.split("-").map(Number);
  const fd=new Date(yr,mo-1,1).getDay();
  const dim=new Date(yr,mo,0).getDate();
  const mName=new Date(yr,mo-1,1).toLocaleString("en-GB",{month:"long",year:"numeric"});
  const prev=()=>{const d=new Date(yr,mo-2,1);setCal(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`);setSel(null);};
  const next=()=>{const d=new Date(yr,mo,1);setCal(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`);setSel(null);};
  const getData=ds=>{
    const hols=Object.entries(HOLIDAYS).flatMap(([o,dates])=>dates[ds]?[{office:o,name:dates[ds]}]:[]).filter(h=>officeFilter==="All"||h.office===officeFilter);
    const leaves=leaveApps.filter(a=>ds>=a.from&&ds<=a.to&&(officeFilter==="All"||a.office===officeFilter));
    return{hols,leaves};
  };
  const sd=sel?getData(sel):null;
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <button onClick={prev} style={{background:C.sub,border:`1px solid ${C.bdr}`,borderRadius:6,padding:"6px 14px",cursor:"pointer",fontWeight:700,fontSize:16}}>‹</button>
        <div style={{fontWeight:700,fontSize:14}}>{mName}</div>
        <button onClick={next} style={{background:C.sub,border:`1px solid ${C.bdr}`,borderRadius:6,padding:"6px 14px",cursor:"pointer",fontWeight:700,fontSize:16}}>›</button>
      </div>

          {sd.hols.length>0&&<div style={{marginBottom:sd.leaves.length>0?12:0}}><div style={{fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:0.5,marginBottom:6}}>Public Holidays</div>{sd.hols.map((h,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}><div style={{width:7,height:7,borderRadius:"50%",background:HOL_C[h.office],flexShrink:0}}/><span style={{fontSize:13}}>{h.name} — {h.office}</span></div>)}</div>}
          {sd.leaves.length>0&&<div><div style={{fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:0.5,marginBottom:6}}>Staff Leave</div>{sd.leaves.map((l,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap"}}><div style={{width:7,height:7,borderRadius:l.status==="pending"?0:2,background:l.status==="pending"?"transparent":OFF_C[l.office],border:l.status==="pending"?`1px solid ${OFF_C[l.office]}`:"none",flexShrink:0}}/><span style={{fontSize:13,fontWeight:600}}>{l.name}</span><span style={{fontSize:12,color:C.muted}}>{l.leaveType}</span><Tag label={l.status} type={l.status==="approved"?"success":l.status==="rejected"?"danger":"warning"}/></div>)}</div>}

      )}
    </div>
  );
}

// ── SETTINGS ──
function Settings({attendance,saveAtt,leaveApps,saveLeave,pins,savePins,staffData,saveStaff}){
  const [rOff,setROff]=React.useState("Hong Kong");
  const [rName,setRName]=React.useState("");
  const [rTypes,setRTypes]=React.useState({att:true,leave:false,pin:false});
  const [rMsg,setRMsg]=React.useState("");
  const [bOff,setBOff]=React.useState("Hong Kong");
  const [bName,setBName]=React.useState("");
  const [bAL,setBAL]=React.useState("");
  const [bHrs,setBHrs]=React.useState("");
  const [bComp,setBComp]=React.useState("");
  const [bMsg,setBMsg]=React.useState("");

  const doReset=()=>{
    if(!rName){setRMsg("Please select a staff member.");return;}
    const key=`${rOff}__${rName}`;
    if(rTypes.att){const a={...attendance};Object.keys(a).forEach(k=>{if(k.startsWith(`${key}__`))delete a[k];});saveAtt(a);}
    if(rTypes.leave){saveLeave(leaveApps.filter(a=>!(a.office===rOff&&a.name===rName)));}
    if(rTypes.pin){const p={...pins};delete p[key];savePins(p);}
    const w=[rTypes.att?"attendance":null,rTypes.leave?"leave":null,rTypes.pin?"PIN":null].filter(Boolean).join(", ");
    setRMsg(`${rName}'s ${w} cleared.`);setTimeout(()=>setRMsg(""),3000);setRName("");
  };

  const doBal=()=>{
    if(!bName){setBMsg("Please select a staff member.");return;}
    const days=parseFloat(bAL),hrs=parseFloat(bHrs)||0,comp=parseFloat(bComp)||0;
    if(isNaN(days)||days<0){setBMsg("Enter valid days.");return;}
    const ns={...staffData};const sl=[...ns[bOff]];const idx=sl.findIndex(s=>s.name===bName);
    if(idx>=0){sl[idx]={...sl[idx],alDays:days,alHours:hrs,compDays:comp};ns[bOff]=sl;saveStaff(ns);}
    setBMsg(`${bName}'s balances updated.`);setTimeout(()=>setBMsg(""),3000);setBName("");setBAL("");setBHrs("");setBComp("");
  };

  const doInit=async()=>{await saveStaff(JSON.parse(JSON.stringify(INITIAL_STAFF)));setBMsg("Staff data initialized.");setTimeout(()=>setBMsg(""),3000);};

  return(
    <div style={{maxWidth:480}}>
      <div style={{fontWeight:700,fontSize:13,color:C.muted,textTransform:"uppercase",letterSpacing:0.5,marginBottom:12}}>Edit Balances</div>
      <Card style={{marginBottom:20}}>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <div><Lbl>Office</Lbl><select value={bOff} onChange={e=>{setBOff(e.target.value);setBName("");}} style={inp}>{Object.keys(INITIAL_STAFF).map(o=><option key={o}>{o}</option>)}</select></div>
          <div><Lbl>Staff Member</Lbl><select value={bName} onChange={e=>setBName(e.target.value)} style={inp}><option value="">Select</option>{(INITIAL_STAFF[bOff]||[]).map(s=><option key={s.name}>{s.name}</option>)}</select></div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
            <div><Lbl>AL Days</Lbl><input type="number" min="0" step="0.5" value={bAL} onChange={e=>setBAL(e.target.value)} placeholder="0" style={inp}/></div>
            <div><Lbl>AL Hours</Lbl><input type="number" min="0" max="7" step="0.5" value={bHrs} onChange={e=>setBHrs(e.target.value)} placeholder="0" style={inp}/></div>
            <div><Lbl>Comp Days</Lbl><input type="number" min="0" step="0.5" value={bComp} onChange={e=>setBComp(e.target.value)} placeholder="0" style={inp}/></div>
          </div>
          {bMsg&&<div style={{background:"#f0fdf4",border:`1px solid #bbf7d0`,borderRadius:8,padding:"10px 14px",fontSize:13,color:C.ok}}>{bMsg}</div>}
          <button onClick={doBal} style={{background:C.acc,color:"#fff",border:"none",borderRadius:8,padding:"11px",fontSize:14,fontWeight:700,cursor:"pointer"}}>Update Balances</button>
        </div>
      </Card>

      <div style={{fontWeight:700,fontSize:13,color:C.muted,textTransform:"uppercase",letterSpacing:0.5,marginBottom:12}}>Reset Staff Data</div>
      <Card style={{marginBottom:20}}>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <div><Lbl>Office</Lbl><select value={rOff} onChange={e=>{setROff(e.target.value);setRName("");}} style={inp}>{Object.keys(INITIAL_STAFF).map(o=><option key={o}>{o}</option>)}</select></div>
          <div><Lbl>Staff Member</Lbl><select value={rName} onChange={e=>setRName(e.target.value)} style={inp}><option value="">Select</option>{(INITIAL_STAFF[rOff]||[]).map(s=><option key={s.name}>{s.name}</option>)}</select></div>
          <div><Lbl>What to reset</Lbl><div style={{display:"flex",flexDirection:"column",gap:8}}>{[["att","Attendance"],["leave","Leave applications"],["pin","PIN"]].map(([k,l])=><label key={k} style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",fontSize:14}}><input type="checkbox" checked={rTypes[k]} onChange={()=>setRTypes(p=>({...p,[k]:!p[k]}))} style={{width:16,height:16}}/>{l}</label>)}</div></div>
          {rMsg&&<div style={{background:"#f0fdf4",border:`1px solid #bbf7d0`,borderRadius:8,padding:"10px 14px",fontSize:13,color:C.ok}}>{rMsg}</div>}
          <button onClick={doReset} style={{background:C.err,color:"#fff",border:"none",borderRadius:8,padding:"11px",fontSize:14,fontWeight:700,cursor:"pointer"}}>Reset Selected Data</button>
        </div>
      </Card>

      <div style={{fontWeight:700,fontSize:13,color:C.muted,textTransform:"uppercase",letterSpacing:0.5,marginBottom:12}}>Initialize Data</div>
      <Card style={{marginBottom:20}}>
        <div style={{fontSize:13,color:C.muted,marginBottom:12}}>First time setup — writes all staff and opening balances to the database. Run once before rollout.</div>
        <button onClick={doInit} style={{background:C.ok,color:"#fff",border:"none",borderRadius:8,padding:"11px",fontSize:14,fontWeight:700,cursor:"pointer",width:"100%"}}>Initialize Staff Data</button>
      </Card>

      <div style={{fontWeight:700,fontSize:13,color:C.muted,textTransform:"uppercase",letterSpacing:0.5,marginBottom:12}}>Staff List</div>
      <Card>
        <div style={{fontSize:13,color:C.muted,marginBottom:12}}>If new staff aren't showing on the login screen, tap below to sync.</div>
        <button onClick={async()=>{await gsWrite("staff",[]);window.location.reload();}} style={{background:C.acc,color:"#fff",border:"none",borderRadius:8,padding:"11px",fontSize:14,fontWeight:700,cursor:"pointer",width:"100%"}}>Sync Staff List</button>
      </Card>
    </div>
  );
}

// ── MAIN APP ──
function App(){
  const [screen,setScreen]=React.useState("login");
  const [selOff,setSelOff]=React.useState("");
  const [selName,setSelName]=React.useState("");
  const [pinIn,setPinIn]=React.useState("");
  const [pinErr,setPinErr]=React.useState("");
  const [isFirst,setIsFirst]=React.useState(false);
  const [showSel,setShowSel]=React.useState(false);
  const [newPin,setNewPin]=React.useState("");
  const [confPin,setConfPin]=React.useState("");
  const [pins,setPins]=React.useState({});
  const [att,setAtt]=React.useState({});
  const [leaves,setLeaves]=React.useState([]);
  const [staff,setStaff]=React.useState(INITIAL_STAFF);
  const [view,setView]=React.useState("home");
  const [aTab,setATab]=React.useState("calendar");
  const [aOff,setAOff]=React.useState("All");
  const [aDate,setADate]=React.useState(today());
  const [editApp,setEditApp]=React.useState(null);
  const [rejModal,setRejModal]=React.useState(null);
  const [rejReason,setRejReason]=React.useState("");
  const [loading,setLoading]=React.useState(true);
  const [bizTrip,setBizTrip]=React.useState(false);

  React.useEffect(()=>{
    (async()=>{
      setLoading(true);
      try{
        const[pd,ad,ld,sd]=await Promise.all([gsRead("pins"),gsRead("attendance"),gsRead("leave"),gsRead("staff")]);
        if(pd){const p={};pd.forEach(r=>p[r.key]=String(r.value).replace(/^pin_/,""));setPins(p);}
        if(ad){const a={};ad.forEach(r=>a[r.key]=JSON.parse(r.value));setAtt(a);}
        if(ld)setLeaves(ld.map(r=>({...r,days:Number(r.days),urgent:r.urgent==="true"})));
        if(sd){const s={};sd.forEach(r=>{if(!s[r.office])s[r.office]=[];s[r.office].push({name:r.name,alDays:Number(r.alDays)||0,alHours:Number(r.alHours)||0,compDays:Number(r.compDays)||0,email:r.email||null,startDate:r.startDate||null});});if(Object.keys(s).length>0)setStaff(s);}
      }catch(e){}
      setLoading(false);
    })();
  },[]);

  const savePins=async p=>{setPins(p);await gsWrite("pins",Object.entries(p).map(([k,v])=>({key:k,value:"pin_"+v})));};
  const saveAtt=async a=>{setAtt(a);await gsWrite("attendance",Object.entries(a).map(([k,v])=>({key:k,value:JSON.stringify(v)})));};
  const saveLeaves=async l=>{setLeaves(l);await gsWrite("leave",l);};
  const saveStaff=async s=>{setStaff(s);await gsWrite("staff",Object.entries(s).flatMap(([office,ms])=>ms.map(m=>({office,...m}))));};

  const allStaff=Object.entries(staff).flatMap(([o,ms])=>ms.map(m=>({...m,office:o})));
  const getEmail=(office,name)=>INITIAL_STAFF[office]?.find(s=>s.name===name)?.email||null;

  const approveLeave=id=>{
    const app=leaves.find(a=>a.id===id);if(!app)return;
    saveLeaves(leaves.map(a=>a.id===id?{...a,status:"approved"}:a));
    if(app.leaveType==="Annual Leave"||app.leaveType==="Compensatory Leave"){
      const ns={...staff};const sl=[...ns[app.office]];const idx=sl.findIndex(s=>s.name===app.name);
      if(idx>=0){
        const cur=sl[idx];
        if(app.leaveType==="Annual Leave"){const th=(cur.alDays*8)+(cur.alHours||0)-(app.days*8);sl[idx]={...cur,alDays:Math.max(0,Math.floor(th/8)),alHours:Math.max(0,th%8)};}
        else{sl[idx]={...cur,compDays:Math.max(0,(cur.compDays||0)-app.days)};}
        ns[app.office]=sl;saveStaff(ns);
      }
    }
    const em=getEmail(app.office,app.name);
    if(em)sendEmail(`Leave Approved — ${fmt(app.from)}${app.from!==app.to?` to ${fmt(app.to)}`:""}`,`Hi ${app.name},\n\nYour ${app.leaveType} has been approved.\n\nDates: ${fmt(app.from)}${app.from!==app.to?` to ${fmt(app.to)}`:""}\nDays: ${app.days}\n\nTaxtran HR`,[em]);
  };

  const rejectLeave=(id,reason)=>{
    const app=leaves.find(a=>a.id===id);
    saveLeaves(leaves.map(a=>a.id===id?{...a,status:"rejected",rejectReason:reason||null}:a));
    if(app){const em=getEmail(app.office,app.name);if(em)sendEmail(`Leave Unsuccessful — ${fmt(app.from)}`,`Hi ${app.name},\n\nYour ${app.leaveType} was unsuccessful.\n\n${reason?`Reason: ${reason}\n`:""}\nTaxtran HR`,[em]);}
    setRejModal(null);setRejReason("");
  };

  const saveEdit=app=>{
    const old=leaves.find(a=>a.id===app.id);
    saveLeaves(leaves.map(a=>a.id===app.id?app:a));
    if(old&&old.status==="approved"&&app.status!=="approved"&&(old.leaveType==="Annual Leave"||old.leaveType==="Compensatory Leave")){
      const ns={...staff};const sl=[...ns[old.office]];const idx=sl.findIndex(s=>s.name===old.name);
      if(idx>=0){
        const cur=sl[idx];
        if(old.leaveType==="Annual Leave"){const th=(cur.alDays*8)+(cur.alHours||0)+(old.days*8);sl[idx]={...cur,alDays:Math.floor(th/8),alHours:th%8};}
        else{sl[idx]={...cur,compDays:(cur.compDays||0)+old.days};}
        ns[old.office]=sl;saveStaff(ns);
      }
    }
    setEditApp(null);
  };

  const handleLogin=()=>{
    if(pinIn===ADMIN_PIN){setScreen("admin");setPinIn("");setPinErr("");return;}
    if(pinIn.length>=4){const m=Object.entries(pins).find(([,p])=>p===pinIn);if(m){const[key]=m;const[o,n]=key.split("__");setSelOff(o);setSelName(n);setScreen("staff");setPinIn("");setPinErr("");setView("home");return;}}
    if(!selOff||!selName){setPinErr("PIN not recognised. Select your name below.");setShowSel(true);return;}
    const key=`${selOff}__${selName}`;
    if(!pins[key]){setIsFirst(true);setPinIn("");setPinErr("");return;}
    setPinErr("Incorrect PIN.");setPinIn("");
  };

  const handleSetPin=()=>{
    if(newPin.length<4){setPinErr("PIN must be at least 4 digits.");return;}
    if(newPin!==confPin){setPinErr("PINs do not match.");return;}
    savePins({...pins,[`${selOff}__${selName}`]:newPin});
    setIsFirst(false);setNewPin("");setConfPin("");setScreen("staff");setView("home");
  };

  const logout=()=>{setScreen("login");setSelOff("");setSelName("");setPinIn("");setPinErr("");setIsFirst(false);setShowSel(false);};

  const markToday=status=>{
    const finalStatus=status==="Present"&&bizTrip?"Business Trip":status;
    saveAtt({...att,[`${selOff}__${selName}__${today()}`]:{status:finalStatus,ts:new Date().toISOString()}});
    setBizTrip(false);setView("marked");
  };

  const submitLeave=({leaveType,from,to,days,note,doctorNote,urgent})=>{
    saveLeaves([...leaves,{id:Date.now(),office:selOff,name:selName,leaveType,from,to,days,note,doctorNote,urgent,status:"pending",submittedAt:new Date().toISOString()}]);
    if(leaveType==="Sick Leave"){
      const na={...att};
      Array.from({length:dBetween(from,to)},(_,i)=>addDays(from,i)).filter(d=>{const dow=new Date(d+"T00:00:00").getDay();return dow!==0&&dow!==6;}).forEach(d=>{na[`${selOff}__${selName}__${d}`]={status:"Sick Leave",ts:new Date().toISOString()};});
      saveAtt(na);
      notify(`Sick Leave — ${selName} (${selOff})`,`${selName} from ${selOff} reported sick leave.\n\nDates: ${fmt(from)}${from!==to?` to ${fmt(to)}`:""}\nDays: ${days}${note?`\nNote: ${note}`:""}`,days);
    }else{
      notify(`${urgent?"Urgent ":""}Leave — ${selName} (${selOff})`,`${selName} from ${selOff} applied for ${leaveType}.\n\nDates: ${fmt(from)}${from!==to?` to ${fmt(to)}`:""}\nDays: ${days}${urgent?"\nType: URGENT":""}${note?`\nNote: ${note}`:""}`,days);
    }
  };

  const cancelLeave=id=>saveLeaves(leaves.map(a=>a.id===id&&a.status==="pending"?{...a,status:"cancelled"}:a));

  const sInfo=staff[selOff]?.find(s=>s.name===selName);
  const myApps=leaves.filter(a=>a.office===selOff&&a.name===selName);
  const todayRec=att[`${selOff}__${selName}__${today()}`];
  const pendCnt=leaves.filter(a=>a.status==="pending").length;

  const Hdr=({title,sub})=>(
    <div style={{borderBottom:`1px solid ${C.bdr}`,paddingBottom:14,marginBottom:20}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div><div style={{fontSize:17,fontWeight:800,color:C.txt}}>{title}</div>{sub&&<div style={{fontSize:12,color:C.muted,marginTop:2}}>{sub}</div>}</div>
        <Btn variant="ghost" onClick={logout} style={{fontSize:13,padding:"6px 10px"}}>Sign out</Btn>
      </div>
    </div>
  );

  // ── LOGIN ──
  if(loading)return <div style={{fontFamily:"system-ui,sans-serif",padding:P,textAlign:"center",paddingTop:80}}><div style={{fontSize:22,fontWeight:800,marginBottom:8}}>Taxtran</div><div style={{fontSize:14,color:C.muted}}>Loading...</div></div>;

  if(screen==="login")return(
    <div style={{fontFamily:"system-ui,sans-serif",maxWidth:480,margin:"0 auto",padding:P,paddingTop:40}}>
      <div style={{marginBottom:28}}><div style={{fontSize:22,fontWeight:800,color:C.txt}}>Taxtran</div><div style={{fontSize:14,color:C.muted,marginTop:4}}>Staff Portal</div></div>
      {!isFirst?(
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          {showSel&&<><div><Lbl>Office</Lbl><select value={selOff} onChange={e=>{setSelOff(e.target.value);setSelName("");setPinErr("");}} style={inp}><option value="">Select office</option>{Object.keys(staff).map(o=><option key={o}>{o}</option>)}</select></div>{selOff&&<div><Lbl>Name</Lbl><select value={selName} onChange={e=>{setSelName(e.target.value);setPinErr("");}} style={inp}><option value="">Select name</option>{(staff[selOff]||[]).map(s=><option key={s.name}>{s.name}</option>)}</select></div>}</>}
          <div><Lbl>PIN</Lbl><input type="password" value={pinIn} onChange={e=>setPinIn(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleLogin()} placeholder="Enter your PIN" style={inp}/></div>
          {pinErr&&<div style={{color:C.err,fontSize:13}}>{pinErr}</div>}
          <Btn onClick={handleLogin} style={{width:"100%",padding:12}}>Continue</Btn>
          {!showSel&&<div onClick={()=>setShowSel(true)} style={{background:C.sub,border:`1px solid ${C.bdr}`,borderRadius:8,padding:"12px",cursor:"pointer",textAlign:"center"}}><div style={{fontSize:13,fontWeight:600,color:C.txt}}>First time logging in?</div><div style={{fontSize:12,color:C.muted,marginTop:2}}>Tap here to select your name and set your PIN</div></div>}
        </div>
      ):(
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <div><div style={{fontSize:17,fontWeight:700}}>Welcome, {selName}</div><div style={{fontSize:13,color:C.muted,marginTop:4}}>Set a PIN to continue.</div></div>
          <div><Lbl>New PIN (min 4 digits)</Lbl><input type="password" value={newPin} onChange={e=>setNewPin(e.target.value)} style={inp}/></div>
          <div><Lbl>Confirm PIN</Lbl><input type="password" value={confPin} onChange={e=>setConfPin(e.target.value)} style={inp}/></div>
          {pinErr&&<div style={{color:C.err,fontSize:13}}>{pinErr}</div>}
          <Btn onClick={handleSetPin} style={{width:"100%",padding:12}}>Set PIN & Continue</Btn>
        </div>
      )}
    </div>
  );

  // ── ADMIN ──
  if(screen==="admin"){
    const filtered=aOff==="All"?allStaff:allStaff.filter(s=>s.office===aOff);
    const fApps=aOff==="All"?leaves:leaves.filter(a=>a.office===aOff);
    const pendApps=fApps.filter(a=>a.status==="pending");
    const tabS=v=>({padding:"8px 10px",borderRadius:6,border:"none",cursor:"pointer",fontWeight:600,fontSize:12,background:aTab===v?C.acc:C.sub,color:aTab===v?"#fff":C.txt,whiteSpace:"nowrap"});
    return(
      <div style={{fontFamily:"system-ui,sans-serif",maxWidth:960,margin:"0 auto",padding:P,background:C.bg,minHeight:"100vh"}}>
        {rejModal&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:P}}><div style={{background:C.sur,borderRadius:12,padding:20,maxWidth:400,width:"100%"}}><div style={{fontWeight:700,fontSize:16,marginBottom:4}}>Reject Leave</div><div style={{fontSize:13,color:C.muted,marginBottom:14}}>{rejModal.name} — {fmt(rejModal.from)}{rejModal.from!==rejModal.to?` to ${fmt(rejModal.to)}`:""}</div><Lbl>Reason (optional)</Lbl><input value={rejReason} onChange={e=>setRejReason(e.target.value)} placeholder="e.g. Insufficient notice..." style={{...inp,marginBottom:14}}/><div style={{display:"flex",gap:8}}><Btn variant="danger" onClick={()=>rejectLeave(rejModal.id,rejReason)} style={{flex:1}}>Confirm Reject</Btn><Btn variant="secondary" onClick={()=>{setRejModal(null);setRejReason("");}} style={{flex:1}}>Cancel</Btn></div></div></div>}
        {editApp&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:P}}><div style={{background:C.sur,borderRadius:12,padding:20,maxWidth:440,width:"100%"}}><div style={{fontWeight:700,fontSize:16,marginBottom:14}}>Edit Leave — {editApp.name}</div><div style={{display:"flex",flexDirection:"column",gap:12}}><div><Lbl>Leave Type</Lbl><select value={editApp.leaveType} onChange={e=>setEditApp({...editApp,leaveType:e.target.value})} style={inp}>{LEAVE_TYPES.map(t=><option key={t}>{t}</option>)}</select></div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}><div><Lbl>From</Lbl><input type="date" value={editApp.from} onChange={e=>setEditApp({...editApp,from:e.target.value,days:dBetween(e.target.value,editApp.to)})} style={inp}/></div><div><Lbl>To</Lbl><input type="date" value={editApp.to} onChange={e=>setEditApp({...editApp,to:e.target.value,days:dBetween(editApp.from,e.target.value)})} style={inp}/></div></div><div><Lbl>Status</Lbl><select value={editApp.status} onChange={e=>setEditApp({...editApp,status:e.target.value})} style={inp}>{["pending","approved","rejected"].map(s=><option key={s}>{s}</option>)}</select></div><div><Lbl>Note</Lbl><input value={editApp.note||""} onChange={e=>setEditApp({...editApp,note:e.target.value})} style={inp}/></div><div style={{display:"flex",gap:8}}><Btn onClick={()=>saveEdit(editApp)} style={{flex:1}}>Save</Btn><Btn variant="secondary" onClick={()=>setEditApp(null)} style={{flex:1}}>Cancel</Btn></div></div></div></div>}

        <div style={{borderBottom:`1px solid ${C.bdr}`,paddingBottom:14,marginBottom:20,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div><div style={{fontSize:18,fontWeight:800}}>Taxtran Admin</div><div style={{fontSize:12,color:C.muted,marginTop:2}}>All Offices</div></div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>{pendCnt>0&&<Tag label={`${pendCnt} pending`} type="warning"/>}<Btn variant="secondary" onClick={logout} style={{fontSize:13}}>Sign out</Btn></div>
        </div>

        <div style={{display:"flex",gap:6,marginBottom:16,flexWrap:"wrap"}}>
          {["calendar","requests","today","balances","summary","settings"].map(v=><button key={v} style={tabS(v)} onClick={()=>setATab(v)}>{v==="requests"?`Requests${pendCnt>0?` (${pendCnt})`:""}`:(v==="today"?"Attendance":v==="balances"?"Balances":v==="calendar"?"Calendar":v==="summary"?"Summary":"Settings")}</button>)}
        </div>
        <div style={{marginBottom:16}}><select value={aOff} onChange={e=>setAOff(e.target.value)} style={{...inp,width:"auto"}}><option>All</option>{Object.keys(staff).map(o=><option key={o}>{o}</option>)}</select></div>

        {aTab==="calendar"&&<Calendar leaveApps={fApps} officeFilter={aOff}/>}

        {aTab==="requests"&&(
          <div>
            {pendApps.length>0&&<div style={{marginBottom:20}}><div style={{fontWeight:700,fontSize:12,color:C.warn,marginBottom:10,textTransform:"uppercase",letterSpacing:0.5}}>Pending Approval</div>{pendApps.map(a=><Card key={a.id} style={{marginBottom:10,borderLeft:`3px solid ${C.warn}`}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:10}}><div><div style={{fontWeight:700,fontSize:14}}>{a.name} <span style={{color:C.muted,fontWeight:400,fontSize:12}}>{a.office}</span>{a.urgent&&<span style={{marginLeft:6,background:"#fffbeb",color:C.warn,borderRadius:4,padding:"1px 6px",fontSize:11,fontWeight:600}}>Urgent</span>}</div><div style={{fontSize:12,marginTop:4,display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}><Tag label={a.leaveType}/><span>{fmt(a.from)}{a.from!==a.to?` — ${fmt(a.to)}`:""}</span><span style={{color:C.muted}}>{a.days}d</span></div>{a.note&&<div style={{fontSize:12,color:C.muted,marginTop:4}}>{a.note}</div>}{a.doctorNote&&<div style={{fontSize:12,color:C.ok,marginTop:2}}>📎 {a.doctorNote}</div>}</div><div style={{display:"flex",gap:6,flexWrap:"wrap"}}><Btn variant="success" onClick={()=>approveLeave(a.id)} style={{fontSize:12,padding:"7px 12px"}}>Approve</Btn><Btn variant="danger" onClick={()=>{setRejModal(a);setRejReason("");}} style={{fontSize:12,padding:"7px 12px"}}>Reject</Btn><Btn variant="secondary" onClick={()=>setEditApp({...a})} style={{fontSize:12,padding:"7px 12px"}}>Edit</Btn></div></div></Card>)}</div>}
            <div style={{fontWeight:700,fontSize:12,color:C.muted,marginBottom:10,textTransform:"uppercase",letterSpacing:0.5}}>All Applications</div>
            {fApps.length===0&&<div style={{color:C.muted,fontSize:14}}>No applications yet.</div>}
            {fApps.slice().reverse().map(a=><Card key={a.id} style={{marginBottom:8}}><div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:8,alignItems:"flex-start"}}><div><span style={{fontWeight:600,fontSize:14}}>{a.name}</span> <span style={{color:C.muted,fontSize:12}}>{a.office}</span>{a.urgent&&<span style={{marginLeft:6,background:"#fffbeb",color:C.warn,borderRadius:4,padding:"1px 6px",fontSize:11,fontWeight:600}}>Urgent</span>}<div style={{fontSize:12,marginTop:4,display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}><Tag label={a.leaveType}/><span>{fmt(a.from)}{a.from!==a.to?` — ${fmt(a.to)}`:""} <span style={{color:C.muted}}>({a.days}d)</span></span></div>{a.note&&<div style={{fontSize:12,color:C.muted,marginTop:2}}>{a.note}</div>}{a.rejectReason&&<div style={{fontSize:12,color:C.err,marginTop:2}}>Reason: {a.rejectReason}</div>}{a.doctorNote&&<div style={{fontSize:12,color:C.ok,marginTop:2}}>📎 {a.doctorNote}</div>}</div><div style={{display:"flex",gap:6,alignItems:"center"}}><Tag label={a.status} type={a.status==="approved"?"success":a.status==="rejected"||a.status==="cancelled"?"danger":"warning"}/><button onClick={()=>setEditApp({...a})} style={{background:"none",border:`1px solid ${C.bdr}`,borderRadius:6,padding:"3px 8px",fontSize:11,cursor:"pointer",color:C.muted}}>Edit</button></div></div></Card>)}
          </div>
        )}

        {aTab==="today"&&<div><div style={{marginBottom:12}}><input type="date" value={aDate} onChange={e=>setADate(e.target.value)} style={{...inp,width:"auto"}}/></div><div style={{overflowX:"auto"}}><Card style={{padding:0,overflow:"hidden"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}><thead><tr style={{background:C.sub}}><th style={{padding:"9px 12px",textAlign:"left",fontWeight:600,borderBottom:`1px solid ${C.bdr}`,whiteSpace:"nowrap"}}>Name</th><th style={{padding:"9px 12px",textAlign:"left",fontWeight:600,borderBottom:`1px solid ${C.bdr}`,whiteSpace:"nowrap"}}>Office</th><th style={{padding:"9px 12px",textAlign:"left",fontWeight:600,borderBottom:`1px solid ${C.bdr}`,whiteSpace:"nowrap"}}>Status</th></tr></thead><tbody>{filtered.map((s,i)=>{const rec=att[`${s.office}__${s.name}__${aDate}`];const app=leaves.find(a=>a.office===s.office&&a.name===s.name&&a.status==="approved"&&aDate>=a.from&&aDate<=a.to);const display=rec?.status||(app?app.leaveType:null);const tt=display==="Present"?"success":display==="Sick Leave"?"danger":display==="Business Trip"?"warning":"neutral";return <tr key={s.name+s.office} style={{background:i%2===0?C.sur:C.bg,borderBottom:`1px solid ${C.bdr}`}}><td style={{padding:"8px 12px",fontWeight:500}}>{s.name}</td><td style={{padding:"8px 12px",color:C.muted,fontSize:12}}>{s.office}</td><td style={{padding:"8px 12px"}}>{display?<Tag label={display} type={tt}/>:<span style={{color:C.muted,fontSize:12}}>—</span>}</td></tr>;})}</tbody></table></Card></div></div>}

        {aTab==="balances"&&<div style={{overflowX:"auto"}}><Card style={{padding:0,overflow:"hidden"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}><thead><tr style={{background:C.sub}}>{["Name","Office","Start Date","AL Balance","Comp Leave","Upcoming Leave"].map(h=><th key={h} style={{padding:"9px 12px",textAlign:"left",fontWeight:600,borderBottom:`1px solid ${C.bdr}`,whiteSpace:"nowrap"}}>{h}</th>)}</tr></thead><tbody>{filtered.map((s,i)=>{const up=leaves.filter(a=>a.office===s.office&&a.name===s.name&&a.status==="approved"&&a.from>=today()).sort((a,b)=>a.from.localeCompare(b.from))[0];return <tr key={s.name+s.office} style={{background:i%2===0?C.sur:C.bg,borderBottom:`1px solid ${C.bdr}`}}><td style={{padding:"8px 12px",fontWeight:500}}>{s.name}</td><td style={{padding:"8px 12px",color:C.muted,fontSize:12}}>{s.office}</td><td style={{padding:"8px 12px",fontSize:12,color:C.muted}}>{s.startDate?fmt(s.startDate):"—"}</td><td style={{padding:"8px 12px"}}><Tag label={fmtBal(s.alDays,s.alHours)} type={s.alDays===0&&s.alHours===0?"danger":"success"}/></td><td style={{padding:"8px 12px"}}><Tag label={`${s.compDays||0}d`} type={(s.compDays||0)>0?"warning":"neutral"}/></td><td style={{padding:"8px 12px",fontSize:12}}>{up?<span>{fmt(up.from)}{up.from!==up.to?` — ${fmt(up.to)}`:""} <span style={{color:C.muted}}>({up.days}d)</span></span>:<span style={{color:C.muted}}>—</span>}</td></tr>;})}</tbody></table></Card></div>}

        {aTab==="summary"&&<div><div style={{fontWeight:700,fontSize:12,color:C.muted,textTransform:"uppercase",letterSpacing:0.5,marginBottom:12}}>Staff Summary</div><div style={{overflowX:"auto"}}><Card style={{padding:0,overflow:"hidden"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}><thead><tr style={{background:C.sub}}>{["Name","Office","Years","AL Balance","Comp Leave","AL Used","Comp Used","Sick Days","Absent"].map(h=><th key={h} style={{padding:"9px 12px",textAlign:"left",fontWeight:600,borderBottom:`1px solid ${C.bdr}`,whiteSpace:"nowrap"}}>{h}</th>)}</tr></thead><tbody>{filtered.map((s,i)=>{const alUsed=leaves.filter(a=>a.office===s.office&&a.name===s.name&&a.status==="approved"&&a.leaveType==="Annual Leave").reduce((sum,a)=>sum+a.days,0);const compUsed=leaves.filter(a=>a.office===s.office&&a.name===s.name&&a.status==="approved"&&a.leaveType==="Compensatory Leave").reduce((sum,a)=>sum+a.days,0);const sick=leaves.filter(a=>a.office===s.office&&a.name===s.name&&a.leaveType==="Sick Leave").reduce((sum,a)=>sum+a.days,0)+Object.entries(att).filter(([k,v])=>k.startsWith(`${s.office}__${s.name}__`)&&v.status==="Sick Leave").length;const absent=Object.entries(att).filter(([k,v])=>k.startsWith(`${s.office}__${s.name}__`)&&v.status==="Absent").length;const yrs=yOS(s.startDate);return <tr key={s.name+s.office} style={{background:i%2===0?C.sur:C.bg,borderBottom:`1px solid ${C.bdr}`}}><td style={{padding:"8px 12px",fontWeight:500}}>{s.name}</td><td style={{padding:"8px 12px",color:C.muted,fontSize:12}}>{s.office}</td><td style={{padding:"8px 12px",fontSize:12,color:C.muted}}>{yrs!==null?`${yrs}y`:"—"}</td><td style={{padding:"8px 12px"}}><Tag label={fmtBal(s.alDays,s.alHours)} type={s.alDays===0?"danger":"success"}/></td><td style={{padding:"8px 12px"}}><Tag label={`${s.compDays||0}d`} type={(s.compDays||0)>0?"warning":"neutral"}/></td><td style={{padding:"8px 12px"}}>{alUsed>0?<Tag label={`${alUsed}d`}/>:<span style={{color:C.muted}}>—</span>}</td><td style={{padding:"8px 12px"}}>{compUsed>0?<Tag label={`${compUsed}d`} type="warning"/>:<span style={{color:C.muted}}>—</span>}</td><td style={{padding:"8px 12px"}}>{sick>0?<Tag label={`${sick}d`} type={sick>=5?"danger":"warning"}/>:<span style={{color:C.muted}}>—</span>}</td><td style={{padding:"8px 12px"}}>{absent>0?<Tag label={`${absent}d`} type="danger"/>:<span style={{color:C.muted}}>—</span>}</td></tr>;})}</tbody></table></Card></div></div>}

        {aTab==="settings"&&<Settings attendance={att} saveAtt={saveAtt} leaveApps={leaves} saveLeave={saveLeaves} pins={pins} savePins={savePins} staffData={staff} saveStaff={saveStaff}/>}
      </div>
    );
  }

  // ── MARK PRESENT ──
  if(view==="mark-present")return(
    <div style={{fontFamily:"system-ui,sans-serif",maxWidth:480,margin:"0 auto",padding:P,background:C.bg,minHeight:"100vh"}}>
      <Hdr title={selName} sub={`${selOff} · ${fmt(today())}`}/>
      <button onClick={()=>setView("home")} style={{background:"none",border:"none",color:C.muted,fontSize:13,cursor:"pointer",padding:0,marginBottom:20}}>← Back</button>
      <div style={{fontSize:16,fontWeight:700,marginBottom:20}}>Mark Attendance</div>
      <Card style={{marginBottom:16}}>
        <div style={{fontSize:14,fontWeight:600,color:C.txt,marginBottom:16}}>{fmt(today())}</div>
        <label style={{display:"flex",alignItems:"center",gap:12,cursor:"pointer",padding:"12px",background:bizTrip?C.sub:C.sur,border:`1px solid ${bizTrip?C.acc:C.bdr}`,borderRadius:8}}>
          <input type="checkbox" checked={bizTrip} onChange={e=>setBizTrip(e.target.checked)} style={{width:18,height:18,cursor:"pointer",flexShrink:0}}/>
          <div><div style={{fontSize:14,fontWeight:600,color:C.txt}}>I am on a business trip today</div><div style={{fontSize:12,color:C.muted,marginTop:2}}>This will be visible to your team on the calendar</div></div>
        </label>
      </Card>
      <Btn onClick={()=>markToday("Present")} style={{width:"100%",padding:12}}>Confirm — {bizTrip?"Business Trip":"Present"}</Btn>
    </div>
  );

  // ── MARKED ──
  if(view==="marked")return(
    <div style={{fontFamily:"system-ui,sans-serif",maxWidth:480,margin:"0 auto",padding:P,background:C.bg,minHeight:"100vh"}}>
      <Hdr title={selName} sub={`${selOff} · ${fmt(today())}`}/>
      <div style={{textAlign:"center",paddingTop:48}}>
        <div style={{width:48,height:48,borderRadius:"50%",background:"#f0fdf4",border:`2px solid ${C.ok}`,margin:"0 auto 16px",display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{width:12,height:12,borderRadius:"50%",background:C.ok}}/></div>
        <div style={{fontSize:18,fontWeight:700,marginBottom:6}}>Marked</div>
        <div style={{fontSize:14,color:C.muted}}>{att[`${selOff}__${selName}__${today()}`]?.status} — {fmt(today())}</div>
        <Btn onClick={()=>setView("home")} style={{marginTop:24}}>Back to Home</Btn>
      </div>
    </div>
  );

  // ── LEAVE / SICK ──
  if(view==="leave"||view==="sick")return(
    <div style={{fontFamily:"system-ui,sans-serif",maxWidth:480,margin:"0 auto",padding:P,background:C.bg,minHeight:"100vh"}}>
      <Hdr title={selName} sub={`${selOff} · ${fmt(today())}`}/>
      <button onClick={()=>setView("home")} style={{background:"none",border:"none",color:C.muted,fontSize:13,cursor:"pointer",padding:0,marginBottom:16}}>← Back</button>
      <div style={{fontSize:16,fontWeight:700,marginBottom:20}}>{view==="sick"?"Report Sick Leave":"Apply for Leave"}</div>
      <LeaveForm selOffice={selOff} initialType={view==="sick"?"Sick Leave":null} onSubmit={submitLeave} onBack={()=>setView("home")}/>
    </div>
  );

  // ── CALENDAR ──
  if(view==="calendar")return(
    <div style={{fontFamily:"system-ui,sans-serif",maxWidth:480,margin:"0 auto",padding:P,background:C.bg,minHeight:"100vh"}}>
      <Hdr title={selName} sub={`${selOff} · ${fmt(today())}`}/>
      <button onClick={()=>setView("home")} style={{background:"none",border:"none",color:C.muted,fontSize:13,cursor:"pointer",padding:0,marginBottom:16}}>← Back</button>
      <div style={{fontSize:16,fontWeight:700,marginBottom:16}}>Team Calendar</div>
      <Calendar leaveApps={leaves.filter(a=>a.office===selOff)} officeFilter={selOff}/>
    </div>
  );

  // ── MY OVERVIEW ──
  if(view==="info"){
    const sick=Object.entries(att).filter(([k,v])=>k.startsWith(`${selOff}__${selName}__`)&&v.status==="Sick Leave").length;
    const absent=Object.entries(att).filter(([k,v])=>k.startsWith(`${selOff}__${selName}__`)&&v.status==="Absent").length;
    const approvedAL=leaves.filter(a=>a.office===selOff&&a.name===selName&&a.status==="approved"&&a.leaveType==="Annual Leave").reduce((s,a)=>s+a.days,0);
    const noPayTotal=leaves.filter(a=>a.office===selOff&&a.name===selName&&(a.status==="approved"||a.status==="pending")&&a.leaveType==="Other Leave").reduce((s,a)=>s+a.days,0);
    return(
      <div style={{fontFamily:"system-ui,sans-serif",maxWidth:480,margin:"0 auto",padding:P,background:C.bg,minHeight:"100vh"}}>
        <Hdr title={selName} sub={`${selOff} · ${fmt(today())}`}/>
        <button onClick={()=>setView("home")} style={{background:"none",border:"none",color:C.muted,fontSize:13,cursor:"pointer",padding:0,marginBottom:16}}>← Back</button>
        <div style={{fontSize:16,fontWeight:700,marginBottom:16}}>My Overview</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:20}}>
          {[
            {label:"AL Balance",value:sInfo?fmtBal(sInfo.alDays,sInfo.alHours):"—",sub:approvedAL>0?`${approvedAL}d approved`:"days remaining"},
            {label:"Comp Leave",value:sInfo?`${sInfo.compDays||0}d`:"—",sub:"remaining"},
            {label:"Sick Days",value:sick,sub:"all time"},
            {label:"No-pay Leave",value:noPayTotal>0?`${noPayTotal}d`:"—",sub:"approved & pending"},
          ].map(({label,value,sub})=>(
          {[
            {label:"AL Balance",value:sInfo?fmtBal(sInfo.alDays,sInfo.alHours):"—",sub:approvedAL>0?`${approvedAL}d approved`:"days remaining"},
            {label:"Comp Leave",value:sInfo?`${sInfo.compDays||0}d`:"—",sub:"remaining"},
            {label:"Sick Days",value:sick,sub:"all time"},
          ].map(({label,value,sub})=>(
            <Card key={label} style={{textAlign:"center",padding:10}}>
              <div style={{fontSize:9,fontWeight:700,color:C.muted,letterSpacing:0.8,textTransform:"uppercase",marginBottom:6}}>{label}</div>
              <div style={{fontSize:22,fontWeight:800,color:C.txt,lineHeight:1}}>{value}</div>
              <div style={{fontSize:10,color:C.muted,marginTop:3}}>{sub}</div>
            </Card>
          ))}
        </div>
        <div style={{fontSize:12,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:0.5,marginBottom:10}}>Leave Applications</div>
        {myApps.length===0&&<div style={{color:C.muted,fontSize:14}}>No applications yet.</div>}
        {myApps.slice().reverse().map(a=>(
          <Card key={a.id} style={{marginBottom:8}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div>
                <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:6}}><Tag label={a.leaveType}/>{a.urgent&&<span style={{background:"#fffbeb",color:C.warn,borderRadius:4,padding:"1px 6px",fontSize:11,fontWeight:600}}>Urgent</span>}</div>
                <div style={{fontSize:13,color:C.txt}}>{fmt(a.from)}{a.from!==a.to?` — ${fmt(a.to)}`:""}</div>
                <div style={{fontSize:12,color:C.muted,marginTop:2}}>{a.days} day{a.days!==1?"s":""}{a.note?` · ${a.note}`:""}</div>
                {a.rejectReason&&<div style={{fontSize:12,color:C.err,marginTop:4}}>Rejected: {a.rejectReason}</div>}
              </div>
              <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6}}>
                <Tag label={a.status} type={a.status==="approved"?"success":a.status==="rejected"||a.status==="cancelled"?"danger":"warning"}/>
                {a.status==="pending"&&<button onClick={()=>cancelLeave(a.id)} style={{background:"none",border:`1px solid ${C.bdr}`,borderRadius:6,padding:"3px 8px",fontSize:11,cursor:"pointer",color:C.err}}>Cancel</button>}
              </div>
            </div>
          </Card>
        ))}
      </div>
    );
  }

  // ── HOME ──
  const ABtn=({label,sub,onClick,disabled})=>(
    <button onClick={disabled?undefined:onClick} style={{background:disabled?C.sub:C.sur,border:`1px solid ${C.bdr}`,borderRadius:10,padding:"16px",textAlign:"left",cursor:disabled?"not-allowed":"pointer",width:"100%",display:"flex",justifyContent:"space-between",alignItems:"center",opacity:disabled?0.5:1}}>
      <div><div style={{fontSize:15,fontWeight:600,color:C.txt}}>{label}</div>{sub&&<div style={{fontSize:12,color:C.muted,marginTop:2}}>{sub}</div>}</div>
      <span style={{color:C.muted,fontSize:18,flexShrink:0}}>›</span>
    </button>
  );

  return(
    <div style={{fontFamily:"system-ui,sans-serif",maxWidth:480,margin:"0 auto",padding:P,background:C.bg,minHeight:"100vh"}}>
      <Hdr title={selName} sub={`${selOff} · ${fmt(today())}`}/>
      {todayRec?<div style={{background:"#f0fdf4",border:`1px solid #bbf7d0`,borderRadius:8,padding:"12px",marginBottom:16,display:"flex",justifyContent:"space-between",alignItems:"center"}}><div style={{fontSize:13,fontWeight:600,color:C.ok}}>Attendance marked</div><Tag label={todayRec.status} type="success"/></div>:<div style={{background:"#fffbeb",border:`1px solid #fde68a`,borderRadius:8,padding:"12px",marginBottom:16}}><div style={{fontSize:13,fontWeight:600,color:C.warn}}>Attendance not marked today</div></div>}
      <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:16}}>
        <ABtn label="Mark as Present" sub={todayRec?"Already marked today":"I am in the office today"} onClick={()=>setView("mark-present")} disabled={!!todayRec}/>
        <ABtn label="Report Sick Leave" sub={todayRec?"Already marked today":"Mark sick for today or multiple days"} onClick={()=>setView("sick")} disabled={!!todayRec}/>
        <ABtn label="Apply for Leave" sub="Annual, compensatory or other leave" onClick={()=>setView("leave")}/>
        <ABtn label="Team Calendar" sub="See who is away in your office" onClick={()=>setView("calendar")}/>
        <ABtn label="My Overview" sub={sInfo?`${fmtBal(sInfo.alDays,sInfo.alHours)} AL · ${sInfo.compDays||0}d comp remaining`:"View balance and history"} onClick={()=>setView("info")}/>
      </div>
      {myApps.filter(a=>a.status==="pending").length>0&&<div onClick={()=>setView("info")} style={{background:C.sub,border:`1px solid ${C.bdr}`,borderRadius:8,padding:"12px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:13,color:C.muted}}>You have a pending leave application</span><span style={{color:C.muted}}>›</span></div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
